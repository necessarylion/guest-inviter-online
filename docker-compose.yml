# Local development services.
# Runs PostgreSQL only — start the app on your host with `bun dev`.
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:17-alpine
    container_name: event_inviter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-event_inviter}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-event_inviter}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
